# HPA + PDB for agency-group-api across clusters
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agency-group-api-hpa
  namespace: agency-group
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agency-group-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agency-group-api-pdb
  namespace: agency-group
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: agency-group-api
