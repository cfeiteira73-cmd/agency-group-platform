name: CI — Agency Group

on:
  workflow_dispatch:

jobs:
  # ── Unit Tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install @swc/jest
        run: npm install --save-dev @swc/jest @swc/core

      - name: Run unit tests
        run: npx jest --coverage --passWithNoTests

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_CRM_DB: ${{ secrets.NOTION_CRM_DB }}
      NOTION_PROPERTIES_DB: ${{ secrets.NOTION_PROPERTIES_DB }}
      NOTION_PIPELINE_DB: ${{ secrets.NOTION_PIPELINE_DB }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 1

  # ── E2E Tests ───────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    env:
      BASE_URL: http://localhost:3000
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_CRM_DB: ${{ secrets.NOTION_CRM_DB }}
      NOTION_PROPERTIES_DB: ${{ secrets.NOTION_PROPERTIES_DB }}
      NOTION_PIPELINE_DB: ${{ secrets.NOTION_PIPELINE_DB }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: .next/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: npx playwright test --reporter=github

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Lighthouse ──────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://agencygroup.pt
            https://agencygroup.pt/imoveis
          uploadArtifacts: true
          temporaryPublicStorage: true
