name: CI — Agency Group

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Unit Tests (Vitest) ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-32chars-min' }}
      NEXTAUTH_URL: 'https://www.agencygroup.pt'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'placeholder' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'placeholder' }}
      NEXT_PUBLIC_BASE_URL: 'https://www.agencygroup.pt'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm vitest run --passWithNoTests

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_CRM_DB: ${{ secrets.NOTION_CRM_DB }}
      NOTION_PROPERTIES_DB: ${{ secrets.NOTION_PROPERTIES_DB }}
      NOTION_PIPELINE_DB: ${{ secrets.NOTION_PIPELINE_DB }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-32chars-min' }}
      NEXTAUTH_URL: 'https://www.agencygroup.pt'
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'placeholder' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 1

  # ── E2E Tests ───────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true   # E2E needs real secrets — doesn't block merge
    env:
      BASE_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-placeholder-secret-32chars-min' }}
      NEXTAUTH_URL: 'http://localhost:3000'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'placeholder' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: .next/

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm exec playwright test --project=chromium --reporter=github --pass-with-no-tests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Lighthouse ──────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://agencygroup.pt
            https://agencygroup.pt/imoveis
          uploadArtifacts: true
          temporaryPublicStorage: true
